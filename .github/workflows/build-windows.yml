name: Build Windows .exe

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app
        run: npm run build

      - name: Build Windows installer
        run: npx electron-builder --win --x64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List release output
        run: Get-ChildItem -Recurse release\ | Select-Object FullName
        shell: powershell

      - name: Upload .exe installer
        uses: actions/upload-artifact@v4
        with:
          name: Timetracker-Windows-installer
          path: release/*.exe
          if-no-files-found: warn
          retention-days: 30

      - name: Upload portable
        uses: actions/upload-artifact@v4
        with:
          name: Timetracker-Windows-portable
          path: release/win-unpacked/
          if-no-files-found: warn
          retention-days: 30
